<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <p>ToDo List App</p>
    </header>
    <div class="inputbar">
        <input type="text" name="taskInput" id="taskInput" class="taskinput" placeholder="Enter task">
        <button id="addBtn" class="addbtn">Add</button>
    </div>

    <ul id="taskList" class="tasklist"></ul>
    <script src="script.js"></script>
</body>
</html>
