<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="calculator">
        <div class="outputscreen">
            
        </div>
        <div class="numpad">
            <button id="clearBtn" class="keys">C</button>
            <button class="keys empty"></button>
            <button id="backspaceBtn" class="keys backspace"><img src="./assets/backspace.png" alt="backspace"></button>
            <button id="plus" class="keys plus">+</button>
            <button class="keys num">7</button>
            <button class="keys num">8</button>
            <button class="keys num">9</button>
            <button id="multiply" class="keys multiply">X</button>
            <button class="keys num">4</button>
            <button class="keys num">5</button>
            <button class="keys num">6</button>
            <button id="minus" class="keys minus">-</button>
            <button class="keys num">1</button>
            <button class="keys num">2</button>
            <button class="keys num">3</button>
            <button id="divide" class="keys divide">/</button>
            <button class="keys empty"></button>
            <button class="keys num">0</button>
            <button class="keys empty"></button>
            <button id="equalto" class="keys equalto">=</button>
        </div>
    </section>
   <script src="script.js"></script>
</body>
</html>
