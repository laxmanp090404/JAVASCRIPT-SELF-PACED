<!DOCTYPE html>

<head>

<body>
    <header>Simple Weather App</header>
    <main>
        <section class="inputBar">
            <input type="text" name="" id="cityInput" placeholder="Enter City Name">
            <button onclick="predict()">Fetch</button>

            <p><span>Temperature</span><span id="temperature"></span></p>
            <p><span>Humidity</span><span id="humidity"></span></p>

        </section>
    </main>
